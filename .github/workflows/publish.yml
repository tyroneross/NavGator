name: Publish packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BUILD_NODE_VERSION: '22'
  PUBLISH_NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.BUILD_NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          ls -la dist/
          node dist/cli/index.js --help >/dev/null

      - name: Setup Node.js for npmjs Trusted Publisher
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.PUBLISH_NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npmjs (with provenance)
        run: npm publish --registry https://registry.npmjs.org --access public

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.PUBLISH_NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tyroneross'

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com --provenance=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
