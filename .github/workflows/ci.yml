name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'
      - 'bl/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_VERSION: '2.1.206'
  CODEX_CLI_VERSION: '0.130.0'
  DISABLE_AUTOUPDATER: '1'

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.11.0', '22']
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install web dependencies
        run: npm --prefix web ci --ignore-scripts

      - name: Audit production dependencies
        run: |
          npm audit --omit=dev --audit-level=moderate
          npm --prefix web audit --omit=dev --audit-level=moderate

      - name: Test full suite
        run: npm test

      - name: Typecheck root and web
        run: npm run typecheck

      - name: Build release payload
        run: npm run build

      - name: Verify packed Claude and Codex surfaces
        run: npm run verify:release

  host-verify:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install project dependencies
        run: |
          npm ci --ignore-scripts
          npm --prefix web ci --ignore-scripts

      - name: Install pinned host CLIs
        run: npm install --global "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}" "@openai/codex@${CODEX_CLI_VERSION}"

      - name: Build release payload
        run: npm run build

      - name: Require live Claude and Codex lifecycle validation
        env:
          REQUIRE_CLAUDE_VALIDATION: '1'
          REQUIRE_CODEX_VALIDATION: '1'
        run: npm run verify:release
